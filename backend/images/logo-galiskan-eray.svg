<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" width="200" height="220" role="img">
  <title>Galiskan Eray Carrelages</title>

  <!-- Icône grille 2x2 -->
  <rect x="77"  y="18"  width="20" height="20" rx="3" fill="#1a56db"/>
  <rect x="101" y="18"  width="20" height="20" rx="3" fill="#1a56db" opacity="0.55"/>
  <rect x="77"  y="42"  width="20" height="20" rx="3" fill="#1a56db" opacity="0.55"/>
  <rect x="101" y="42"  width="20" height="20" rx="3" fill="#1a56db"/>

  <!-- Nom -->
  <text x="100" y="92" text-anchor="middle"
    font-family="'Syne', 'Segoe UI', system-ui, sans-serif"
    font-size="17" font-weight="700" fill="#0d1117">GALISKAN</text>
  <text x="100" y="112" text-anchor="middle"
    font-family="'Syne', 'Segoe UI', system-ui, sans-serif"
    font-size="17" font-weight="700" fill="#0d1117">ERAY</text>

  <!-- Séparateur -->
  <rect x="30" y="120" width="140" height="2" rx="1" fill="#1a56db"/>

  <!-- Sous-titre -->
  <text x="100" y="138" text-anchor="middle"
    font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
    font-size="11" font-weight="400" fill="#5a6478" letter-spacing="3">CARRELAGES</text>
  <text x="100" y="155" text-anchor="middle"
    font-family="'Inter', 'Segoe UI', system-ui, sans-serif"
    font-size="8.5" font-weight="400" fill="#a0aec0" letter-spacing="2">ARTISAN · LIMOGES</text>
</svg>
